        condition: service_healthy
      eureka-service:
        condition: service_started
    networks:
      - enzo-net

  productos-service:
    build:
      context: ./productos-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      EUREKA_HOST: eureka-service
      CONFIG_HOST: config-server
    depends_on:
      mysql:
        condition: service_healthy
      eureka-service:
        condition: service_started
    networks:
      - enzo-net

  reservas-service:
    build:
      context: ./reservas-service
    restart: unless-stopped
