      DB_HOST: mysql
      EUREKA_HOST: eureka-service
      CONFIG_HOST: config-server
    depends_on:
      mysql:
        condition: service_healthy
      eureka-service:
        condition: service_started
    networks:
      - enzo-net

networks:
  enzo-net:
    driver: bridge

volumes:
  mysql_data:
