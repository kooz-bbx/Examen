spring:
  application:
    name: empleados-service

  # Config Server centralizado (opcional). Si esta desactivado, el servicio
  # funciona de forma autonoma con la configuracion de este mismo archivo.
  config:
    import: optional:configserver:http://${CONFIG_HOST:localhost}:8888
  cloud:
    config:
      enabled: false

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/bd_empleados
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # OBLIGATORIO por la pauta: el esquema lo crea Flyway, Hibernate solo valida.
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  # Puerto aleatorio: el microservicio nunca se expone directamente,
  # solo se accede a traves del API Gateway.
  port: 0
  forward-headers-strategy: framework

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# Documentacion OpenAPI / Swagger de este microservicio.
# El API Gateway agrega este endpoint en su propio Swagger UI.
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
